version: '3.8'

networks:
  ocr-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ocr-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - risk-engine
    networks:
      - ocr-network

  app:
    build:
      context: ./services/app-laravel
      args:
        APP_ENV: production
    image: ocr-app:${IMAGE_TAG:-latest}
    container_name: ocr-app
    restart: always
    environment:
      APP_NAME: "OpenChildRisk OS"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      RISK_ENGINE_URL: http://risk-engine:8001
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      risk-engine:
        condition: service_started
    networks:
      - ocr-network

  risk-engine:
    build: ./services/risk-engine-python
    image: ocr-risk-engine:${IMAGE_TAG:-latest}
    container_name: ocr-risk-engine
    restart: always
    expose:
      - "8001"
    networks:
      - ocr-network

  postgres:
    image: postgis/postgis:16-3.4
    container_name: ocr-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ocr-redis
    restart: always
    command: >
      sh -c "redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ocr-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    networks:
      - ocr-network
